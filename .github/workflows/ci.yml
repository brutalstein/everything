name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace --all-targets

  electron:
    name: Electron (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/everything-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/everything-app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  python:
    name: Python (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: python/everything_control
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/everything_control/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: python -m build

  source-package:
    name: Source package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install tree-sitter tree-sitter-rust
      - run: python scripts/check_versions.py
      - run: bash -n bootstrap.sh setup.sh install.sh package-source.sh scripts/verify.sh
      - run: python scripts/static_rust_check.py
      - run: python scripts/smoke_mvp.py
      - run: python scripts/smoke_installers.py
      - run: python scripts/package_source.py
      - run: python scripts/validate_source_archive.py everything-source.zip

  installer-windows:
    name: Windows installer syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/smoke_installers.py
      - shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          [void][scriptblock]::Create((Get-Content -Raw install.ps1))
          [void][scriptblock]::Create((Get-Content -Raw setup.ps1))
          [void][scriptblock]::Create((Get-Content -Raw bootstrap.ps1))
          [void][scriptblock]::Create((Get-Content -Raw package-source.ps1))
          [void][scriptblock]::Create((Get-Content -Raw scripts/verify.ps1))
